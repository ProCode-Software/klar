# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Publish Prebuilds

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-gocache-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gocache-

      - name: Build
        run: ./scripts/build.sh
        env:
          COMMIT_VER: 1

      - name: Create GitHub Release
        run: |
          last_prebuild=$(gh release ls -L 1 --json tagName | jq -r '.[0].tagName')
          [[ $last_prebuild == null ]] && last_prebuild=0
          prebuild_num=$((${last_prebuild/prebuild-/} + 1))
          gh release create "prebuild-$prebuild_num" -p \
            -t "Prebuild $prebuild_num" \
            --latest --generate-notes ./bin/*
        env:
          GH_TOKEN: ${{ github.token }}
